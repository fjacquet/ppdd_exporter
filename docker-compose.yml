---
# End-to-end demo stack — exporter BUILT FROM SOURCE.
#   docker compose up --build
# Then open Grafana at http://localhost:3000 (admin/admin) → "PowerProtect DD — Overview".
#
# Services: mockdd (fake DD appliance) -> ppdd_exporter -> prometheus -> grafana.
# mockdd serves demo fixtures so the dashboard populates without real hardware.
services:
  mockdd:
    build:
      context: .
      dockerfile: deploy/mockdd/Dockerfile
    image: ppdd_mockdd
    pull_policy: build
    container_name: ppdd_mockdd
    restart: unless-stopped

  ppdd_exporter:
    build: .
    image: ppdd_exporter
    # Build-only image (no registry). Without this, `docker compose pull`/`up`
    # tries to pull `ppdd_exporter` from Docker Hub and fails with access-denied.
    pull_policy: build
    container_name: ppdd_exporter
    command: ["--config", "/etc/ppdd_exporter/config.yaml"]
    ports:
      - "9099:9099"
    volumes:
      - ./config.demo.yaml:/etc/ppdd_exporter/config.yaml:ro
    depends_on:
      - mockdd
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: ppdd_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ppdd_exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ppdd_grafana
    ports:
      - "3000:3000"
    environment:
      # Test-stack credentials (admin / admin). Change for anything non-local.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      # Datasource + dashboard providers (auto-provisioned on startup).
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Bundled dashboards.
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
