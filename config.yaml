---
server:
  host: "0.0.0.0"
  port: "9441"
  uri: "/metrics"
  logName: ""            # "" -> stdout
collection:
  interval: "5m"
  timeout: "60s"
systems:
  # Single-system quickstart: set PPDD1_HOSTNAME, PPDD1_USERNAME, PPDD1_PASSWORD
  # in the environment (or a .env file). config.yaml is the source of truth —
  # for multiple systems add one entry per system (literal values or ${PPDD2_*} refs).
  - name: dd-prod-01
    host: "${PPDD1_HOSTNAME}"
    username: "${PPDD1_USERNAME}"
    password: "${PPDD1_PASSWORD}"
    # insecureSkipVerify disables TLS certificate verification (man-in-the-middle
    # risk). Leave it off in production; only enable for dev/test against a DD with
    # a self-signed cert (see config.demo.yaml, which targets the mockdd appliance).
    # Accepts a native boolean or a ${VAR} env reference resolved at startup:
    #   insecureSkipVerify: true
    #   insecureSkipVerify: ${PPDD1_SKIP_CERTIFICATE}
    # insecureSkipVerify: false
