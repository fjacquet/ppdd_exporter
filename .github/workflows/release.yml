name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Scan the source tree (go.mod) and emit a CycloneDX SBOM, then attach it to
      # the GitHub release so consumers can audit dependencies / scan for CVEs.
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: ppdd_exporter_${{ github.ref_name }}_sbom.cdx.json
          upload-release-assets: false
      - uses: softprops/action-gh-release@v3
        with:
          files: ppdd_exporter_${{ github.ref_name }}_sbom.cdx.json
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version: '1.26' }
      - name: Build
        env: { GOOS: '${{ matrix.goos }}', GOARCH: '${{ matrix.goarch }}' }
        run: |
          CGO_ENABLED=0 go build -ldflags "-X main.version=${GITHUB_REF_NAME}" \
            -o ppdd_exporter_${{ matrix.goos }}_${{ matrix.goarch }} .
      - uses: softprops/action-gh-release@v3
        with:
          files: ppdd_exporter_${{ matrix.goos }}_${{ matrix.goarch }}
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # buildx with the docker-container driver is required for the sbom/provenance
      # attestations below; the default docker driver cannot emit them.
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/fjacquet/ppdd_exporter:${{ github.ref_name }},ghcr.io/fjacquet/ppdd_exporter:latest
          build-args: VERSION=${{ github.ref_name }}
          # Attach an SBOM and max-mode provenance attestation to the pushed image.
          sbom: true
          provenance: mode=max
