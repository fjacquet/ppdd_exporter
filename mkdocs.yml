site_name: ppdd_exporter
site_description: Prometheus exporter for Dell PowerProtect DD (Data Domain) appliances
repo_url: https://github.com/fjacquet/ppdd_exporter
exclude_docs: |
  superpowers/
theme:
  name: material
  features: [navigation.sections, navigation.top, content.code.copy]
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Quick start: getting-started/quickstart.md
  - Metrics reference: metrics.md
  - Deployment:
      - Docker: deployment/docker.md
      - End-to-end demo (Compose): deployment/compose-demo.md
  - Architecture decisions:
      - Overview: adr/index.md
      - 0001 Snapshot model: adr/0001-prometheus-snapshot-model.md
      - 0002 Modular collectors: adr/0002-modular-resource-collectors.md
      - 0003 Provisional API mappings: adr/0003-provisional-api-mappings.md
      - 0004 Token auth & retry: adr/0004-token-auth-retry-policy.md
      - 0005 Hot reload swap: adr/0005-config-hot-reload-rebuild-and-swap.md
      - 0006 Label-key consistency: adr/0006-label-key-consistency-invariant.md
      - Template: adr/0000-template.md
