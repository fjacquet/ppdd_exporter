replicaCount: 1

image:
  repository: ghcr.io/fjacquet/ppdd_exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 9441

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes: []
# - name: config-templated
#   emptyDir:
#     sizeLimit: 16Mi
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - mountPath: /app/config
#   name: config-templated
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline exporter config, rendered into a Secret mounted at /etc/ppdd_exporter/config.yaml.
# Replace placeholders with real values or reference them via env vars (${PPDD1_HOSTNAME} etc.).
config: |
  server:
    host: "0.0.0.0"
    port: "9441"
    uri: "/metrics"
    logName: ""
  collection:
    interval: "5m"
    timeout: "60s"
  systems:
    - name: dd-prod-01
      host: "${PPDD1_HOSTNAME}"
      username: "${PPDD1_USERNAME}"
      password: "${PPDD1_PASSWORD}"
      # insecureSkipVerify: true

env: []
# - name: PPDD1_HOSTNAME
#   value: my-dd-appliance.example.com
# - name: PPDD1_USERNAME
#   value: monitor
# - name: PPDD1_PASSWORD
#   valueFrom:
#     secretKeyRef:
#       name: my-ppdd-secret
#       key: password

deploymentAnnotations: {}

podAnnotations:
  prometheus.io/scrape: "false"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9441"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
