---
# End-to-end demo stack — exporter PULLED FROM GHCR.
#   docker compose -f deploy/compose/docker-compose.ghcr.yml up
# Then open Grafana at http://localhost:3000 (admin/admin) → "PowerProtect DD — Overview".
#
# Identical to docker-compose.build.yml except the exporter runs the published image
# instead of building from source. (mockdd is still built locally — there is no
# published mock image; it exists only for this demo.) Override the tag with
# PPDD_IMAGE_TAG, e.g. PPDD_IMAGE_TAG=v0.1.0 docker compose -f ... up.

services:
  mockdd:
    build:
      context: ../..
      dockerfile: deploy/mockdd/Dockerfile
    expose:
      - "3009"

  exporter:
    image: ghcr.io/fjacquet/ppdd_exporter:${PPDD_IMAGE_TAG:-latest}
    command: ["--config", "/etc/ppdd_exporter/config.yaml"]
    volumes:
      - ./config.yaml:/etc/ppdd_exporter/config.yaml:ro
    expose:
      - "9099"
    ports:
      - "9099:9099"
    depends_on:
      - mockdd

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"
    ports:
      - "9090:9090"
    depends_on:
      - exporter

  grafana:
    image: grafana/grafana:11.5.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
