---
# End-to-end demo stack — exporter BUILT FROM SOURCE.
#   docker compose -f deploy/compose/docker-compose.build.yml up --build
# Then open Grafana at http://localhost:3000 (admin/admin) → "PowerProtect DD — Overview".
#
# Services: mockdd (fake DD appliance) -> exporter -> prometheus -> grafana.
# All build contexts are the repo root (../..).

services:
  mockdd:
    build:
      context: ../..
      dockerfile: deploy/mockdd/Dockerfile
    expose:
      - "3009"

  exporter:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["--config", "/etc/ppdd_exporter/config.yaml"]
    volumes:
      - ./config.yaml:/etc/ppdd_exporter/config.yaml:ro
    expose:
      - "9099"
    ports:
      - "9099:9099"
    depends_on:
      - mockdd

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"
    ports:
      - "9090:9090"
    depends_on:
      - exporter

  grafana:
    image: grafana/grafana:11.5.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../grafana:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
